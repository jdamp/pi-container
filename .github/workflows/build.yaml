name: Build and Push Docker Image

on:
  push:
    branches: [main]
  schedule:
    # Check for new pi-coding-agent releases daily at 06:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pi-coding-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest pi-coding-agent version
        id: pi-version
        run: |
          VERSION=$(npm view @mariozechner/pi-coding-agent version)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "pi-coding-agent version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.pi-version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PI_VERSION=${{ steps.pi-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write job summary
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.pi-version.outputs.version }}"
          {
            echo "## Published Image"
            echo ""
            echo "| Tag | Full reference |"
            echo "| --- | --- |"
            echo "| \`latest\` | \`${IMAGE}:latest\` |"
            echo "| \`${VERSION}\` | \`${IMAGE}:${VERSION}\` |"
          } >> "$GITHUB_STEP_SUMMARY"